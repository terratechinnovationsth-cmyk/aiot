<script>
    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(() => drawChart(1));

    function drawChart(days) {
        // แทนที่ด้วย ID ของคุณ (ตรวจสอบให้แน่ใจว่าถูกต้อง)
        const sheetID = '1xHbWToMwGLVQCYtH2A5FH4MaYDB9lt3QkIbcEz8coQI';
        
        // ใช้ Query แบบระบุช่วงข้อมูลที่แน่นอน
        // A คือ Timestamp, B คือ Temp, C คือ Humidity
        const queryUrl = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json&tq=select A,B,C order by A desc limit ${days * 200}`;
        
        const query = new google.visualization.Query(queryUrl);
        query.send(response => {
            if (response.isError()) {
                console.error('Error in query: ' + response.getMessage());
                return;
            }
            const data = response.getDataTable();
            
            // 1. อัปเดตตัวเลขล่าสุดบน Dashboard
            if (data.getNumberOfRows() > 0) {
                // ดึงค่าแถวบนสุด (ล่าสุด)
                const latestT = data.getValue(0, 1);
                const latestH = data.getValue(0, 2);
                document.getElementById('t_val').innerText = (latestT ? latestT.toFixed(1) : "--") + "°C";
                document.getElementById('h_val').innerText = (latestH ? latestH.toFixed(1) : "--") + "%";
            }

            // 2. จัดการข้อมูลสำหรับวาดกราฟ
            const view = new google.visualization.DataView(data);
            // เรียงลำดับจากเก่าไปใหม่เพื่อให้เส้นกราฟวิ่งจากซ้ายไปขวา
            view.setRows(data.getSortedRows([{column: 0, asc: true}]));
            
            const options = {
                curveType: 'function',
                legend: { position: 'bottom' },
                colors: ['#e74c3c', '#3498db'],
                hAxis: { title: 'Timeline (Date/Time)', textStyle: { fontSize: 10 } },
                vAxis: { title: 'Value', gridlines: { color: '#eee' } },
                chartArea: { width: '85%', height: '70%' },
                // เพิ่มการตั้งค่าให้กราฟแสดงผลแม้ข้อมูลยังน้อย
                interpolateNulls: true
            };

            const chart = new google.visualization.LineChart(document.getElementById('line_chart'));
            chart.draw(view, options);
        });
    }

    // รีเฟรชข้อมูลทุก 1 นาที
    setInterval(() => {
        drawChart(1);
    }, 60000);
</script>
