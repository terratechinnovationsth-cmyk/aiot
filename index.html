<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraTech Professional Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        /* โทนสี Dark Mode ตามภาพอ้างอิง */
        :root {
            --bg-dark: #0b0e11;       /* พื้นหลังหลักดำสนิท */
            --card-bg: #161b22;       /* พื้นหลังการ์ดเทาเข้ม */
            --text-main: #e4e6eb;     /* ตัวอักษรหลักขาวเทา */
            --accent-orange: #ff9f43; /* สีส้มสำหรับ Temperature */
            --accent-blue: #00d2ff;   /* สีฟ้าสำหรับ Humidity */
            --border-color: #30363d;  /* สีเส้นขอบ */
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }

        header {
            padding: 30px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .dashboard-title {
            font-weight: bold;
            letter-spacing: 1px;
            color: #ffffff;
        }

        /* การ์ดสไตล์ Professional */
        .tech-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            height: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* รูปภาพพืช (แทนที่รูปแมว) */
        .crop-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .crop-label {
            font-size: 0.8rem;
            color: #8b949e;
            margin-top: 8px;
            text-transform: uppercase;
        }

        .label-text {
            color: #8b949e;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .value-display {
            font-size: 2.8rem;
            font-weight: bold;
            color: #ffffff;
            margin: 10px 0;
        }

        .unit {
            font-size: 1.2rem;
            color: #8b949e;
            margin-left: 5px;
        }

        .btn-group-tech .btn {
            border-color: var(--border-color);
            color: #8b949e;
            background: transparent;
        }

        .btn-group-tech .btn:hover, .btn-group-tech .btn.active-btn {
            background-color: #1f6feb;
            color: white;
            border-color: #58a6ff;
        }

        /* พื้นที่กราฟ */
        #line_chart {
            width: 100%;
            height: 400px;
            background: transparent;
        }
    </style>
</head>
<body>

    <header class="text-center">
        <div class="container d-md-flex justify-content-between align-items-center text-md-start">
            <div>
                <h1 class="h3 dashboard-title mb-1">TERRATECH INNOVATION</h1>
                <p class="text-secondary mb-0">Agricultural Environmental Monitoring</p>
            </div>
            <div class="text-md-end mt-3 mt-md-0">
                <h2 id="clockDisplay" class="h4 mb-0 text-light" style="font-weight: 300;">-- --:--</h2>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="row g-3 mb-4 text-center">
            <div class="col-4">
                <img src="https://images.unsplash.com/photo-1518635017498-87f514b751ba?auto=format&fit=crop&w=400&q=80" class="crop-img" alt="Strawberry">
                <div class="crop-label">Strawberry</div>
            </div>
            <div class="col-4">
                <img src="https://images.unsplash.com/photo-1628114004944-77a3d24e132c?auto=format&fit=crop&w=400&q=80" class="crop-img" alt="Hemp">
                <div class="crop-label">Hemp</div>
            </div>
            <div class="col-4">
                <img src="https://images.unsplash.com/photo-1588556041238-9e66598c199f?auto=format&fit=crop&w=400&q=80" class="crop-img" alt="Mushroom">
                <div class="crop-label">Mushroom</div>
            </div>
        </div>

        <div class="row g-4 mb-4 text-center">
            <div class="col-md-6">
                <div class="tech-card">
                    <div class="label-text">
                        <span>Temperature</span>
                        <span style="color: var(--accent-orange);">🌡️</span>
                    </div>
                    <div class="value-display" id="t_val">--<span class="unit">°C</span></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="tech-card">
                    <div class="label-text">
                        <span>Humidity</span>
                        <span style="color: var(--accent-blue);">💧</span>
                    </div>
                    <div class="value-display" id="h_val">--<span class="unit">%</span></div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="tech-card">
                    <div class="d-md-flex justify-content-between align-items-center mb-4">
                        <h3 class="h6 fw-bold text-uppercase m-0" style="color: #8b949e;">Historical Trend</h3>
                        <div class="btn-group btn-group-tech mt-3 mt-md-0" role="group">
                            <button type="button" class="btn btn-sm" onclick="drawChart(1)">1 Day</button>
                            <button type="button" class="btn btn-sm" onclick="drawChart(7)">7 Days</button>
                            <button type="button" class="btn btn-sm" onclick="drawChart(30)">1 Month</button>
                        </div>
                    </div>
                    <div id="line_chart">กำลังดึงข้อมูล...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 🔒 Logic การเชื่อมต่อเดิม ห้ามเปลี่ยนแปลง ---
        google.charts.load('current', {'packages':['corechart']});
        google.charts.setOnLoadCallback(() => drawChart(1));

        function drawChart(days) {
            const sheetID = '1xHbWToMwGLVQCYtH2A5FH4MaYDB9lt3QkIbcEz8coQI';
            const query = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tq=select A,B,C order by A desc limit ${days * 200}`);
            
            query.send(response => {
                if (response.isError()) {
                    document.getElementById('line_chart').innerHTML = "Error: " + response.getMessage();
                    return;
                }
                const data = response.getDataTable();
                
                if (data.getNumberOfRows() > 0) {
                    let t = data.getValue(0, 1);
                    let h = data.getValue(0, 2);
                    document.getElementById('t_val').innerHTML = (typeof t === 'number' ? t.toFixed(1) : t) + '<span class="unit">°C</span>';
                    document.getElementById('h_val').innerHTML = (typeof h === 'number' ? h.toFixed(1) : h) + '<span class="unit">%</span>';
                }

                const view = new google.visualization.DataView(data);
                view.setRows(data.getSortedRows([{column: 0, asc: true}]));
                
                /* ปรับแต่งกราฟให้สะอาดตา (Clean & Minimalist) */
                const options = {
                    curveType: 'function',
                    lineWidth: 3,
                    legend: { position: 'bottom', textStyle: { color: '#8b949e', fontSize: 12 } },
                    colors: ['#ff9f43', '#00d2ff'], 
                    backgroundColor: 'transparent',
                    chartArea: { width: '90%', height: '75%', left: 50, right: 20 },
                    hAxis: { 
                        gridlines: { color: 'transparent' }, 
                        textStyle: { color: '#555', fontSize: 10 },
                        baselineColor: '#30363d'
                    },
                    vAxis: { 
                        gridlines: { color: '#21262d', count: 5 },
                        minorGridlines: { color: 'transparent' },
                        textStyle: { color: '#8b949e', fontSize: 11 },
                        baselineColor: '#30363d',
                        viewWindow: { min: 0 } 
                    },
                    crosshair: { trigger: 'both', orientation: 'vertical', color: '#58a6ff' },
                    interpolateNulls: true,
                    animation: { startup: true, duration: 800, easing: 'out' }
                };

                const chart = new google.visualization.LineChart(document.getElementById('line_chart'));
                chart.draw(view, options);
            });
        }

        function updateClock() {
            const now = new Date();
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            document.getElementById('clockDisplay').innerText = days[now.getDay()] + ' ' + now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();

        setInterval(() => drawChart(1), 60000);
    </script>
</body>
</html>
