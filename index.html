<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraTech Dashboard | Dark Mode Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        :root {
            --bg-dark: #0b0e11;
            --card-bg: #161b22;
            --text-main: #e4e6eb;
            --border-color: #30363d;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }

        header {
            padding: 30px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .dashboard-title { font-weight: bold; color: #ffffff; }

        .tech-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            height: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .label-text {
            color: #8b949e;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        /* --- Half-Gauge UI --- */
        .gauge-wrapper {
            position: relative;
            width: 240px;
            height: 120px;
            margin: 0 auto;
            overflow: hidden;
        }

        .gauge-bg {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: #222; /* พื้นหลังกันพลาด */
            mask: radial-gradient(farthest-side, transparent 75%, white 76%);
            -webkit-mask: radial-gradient(farthest-side, transparent 75%, white 76%);
        }

        /* Temp Gradient: แบ่ง 4 ช่วงสี (0-15-30-45-60) */
        .temp-gradient {
            background: conic-gradient(from -90deg, 
                #2ecc71 0deg, #2ecc71 45deg,   /* เขียว 0-15 */
                #f1c40f 45deg, #f1c40f 90deg,  /* เหลือง 16-30 */
                #e67e22 90deg, #e67e22 135deg, /* ส้ม 31-45 */
                #e74c3c 135deg, #e74c3c 180deg /* แดง 46-60 */
            );
        }

        /* Hum Gradient: แบ่ง 4 ช่วงสี (0-25-50-75-100) */
        .hum-gradient {
            background: conic-gradient(from -90deg, 
                #a5f3fc 0deg, #a5f3fc 45deg,   /* ฟ้าอ่อน 0-25 */
                #00d2ff 45deg, #00d2ff 90deg,  /* ฟ้า 26-50 */
                #004e92 90deg, #004e92 135deg, /* น้ำเงิน 51-75 */
                #002147 135deg, #002147 180deg /* น้ำเงินเข้ม 76-100 */
            );
        }

        .needle {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 4px;
            height: 100px;
            background: #ffffff;
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(-90deg);
            transition: transform 2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            z-index: 10;
            border-radius: 10px;
        }

        .needle-pivot {
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            background: #ffffff;
            border-radius: 50%;
            z-index: 11;
        }

        .value-display {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            margin-top: 10px;
        }

        .unit { font-size: 1.1rem; color: #8b949e; }

        #line_chart { width: 100%; height: 400px; background: transparent; }

        .btn-group-tech .btn { border-color: var(--border-color); color: #8b949e; }
        .btn-group-tech .btn:hover, .btn-group-tech .btn.active-btn { background-color: #1f6feb; color: white; }
    </style>
</head>
<body>

    <header class="text-center">
        <div class="container d-md-flex justify-content-between align-items-center text-md-start">
            <div>
                <h1 class="h3 dashboard-title mb-1">TERRATECH INNOVATIONS</h1>
                <p class="text-secondary mb-0">Agricultural Precision Gauges</p>
            </div>
            <div class="text-md-end mt-3 mt-md-0">
                <h2 id="clockDisplay" class="h4 mb-0 text-light" style="font-weight: 300;">-</h2>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="row g-4 mb-4">
            <div class="col-md-6">
                <div class="tech-card text-center">
                    <div class="label-text"><span>Temperature (0-60)</span><span>°C</span></div>
                    <div class="gauge-wrapper">
                        <div class="gauge-bg temp-gradient"></div>
                        <div id="tempNeedle" class="needle"></div>
                        <div class="needle-pivot"></div>
                    </div>
                    <div class="value-display" id="t_val">--</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="tech-card text-center">
                    <div class="label-text"><span>Humidity (0-100)</span><span>%</span></div>
                    <div class="gauge-wrapper">
                        <div class="gauge-bg hum-gradient"></div>
                        <div id="humNeedle" class="needle"></div>
                        <div class="needle-pivot"></div>
                    </div>
                    <div class="value-display" id="h_val">--</div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="tech-card">
                    <div class="d-md-flex justify-content-between align-items-center mb-4">
                        <h3 class="h6 fw-bold text-uppercase m-0" style="color: #8b949e;">Historical Trend</h3>
                        <div class="btn-group btn-group-tech mt-3 mt-md-0" role="group">
                            <button type="button" class="btn btn-sm" onclick="drawChart(1)">1 Day</button>
                            <button type="button" class="btn btn-sm" onclick="drawChart(7)">7 Days</button>
                            <button type="button" class="btn btn-sm" onclick="drawChart(30)">1 Month</button>
                        </div>
                    </div>
                    <div id="line_chart">กำลังดึงข้อมูล...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        google.charts.load('current', {'packages':['corechart']});
        google.charts.setOnLoadCallback(() => drawChart(1));

        function drawChart(days) {
            const sheetID = '1xHbWToMwGLVQCYtH2A5FH4MaYDB9lt3QkIbcEz8coQI';
            const query = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tq=select A,B,C order by A desc limit ${days * 200}`);
            
            query.send(response => {
                if (response.isError()) {
                    document.getElementById('line_chart').innerHTML = "Error: " + response.getMessage();
                    return;
                }
                const data = response.getDataTable();
                
                if (data.getNumberOfRows() > 0) {
                    let t = data.getValue(0, 1);
                    let h = data.getValue(0, 2);
                    
                    document.getElementById('t_val').innerHTML = (typeof t === 'number' ? t.toFixed(1) : t) + '<span class="unit">°C</span>';
                    document.getElementById('h_val').innerHTML = (typeof h === 'number' ? h.toFixed(1) : h) + '<span class="unit">%</span>';
                    
                    // --- คำนวณองศาเข็ม (Smooth Needle Logic) ---
                    // อุณหภูมิ: 0-60 องศา แมพเป็น -90 ถึง 90 องศา (1 องศาเซลเซียส = 3 องศาบนหน้าปัด)
                    // --- คำนวณองศาเข็มแบบล็อกช่วงสี (Fixed Zones) ---
                    // --- คำนวณองศาเข็มให้ตรงกับค่าจริง (0-60 C แมพเข้ากับ -90 ถึง 90 องศา) ---
                    // สูตร: (ค่าปัจจุบัน / ค่าสูงสุด) * ช่วงองศาทั้งหมด - องศาเริ่มต้น
                    // (t / 60) * 180 - 90
                    let tMapped = (t * 3) - 90; 

                    // จำกัดขอบเขตไม่ให้เข็มทะลุเกจ
                    if (tMapped > 90) tMapped = 90;
                    if (tMapped < -90) tMapped = -90;

                    // ความชื้น: 0-100% แมพเป็น -90 ถึง 90 องศา (1% = 1.8 องศาบนหน้าปัด)
                    let hMapped = (h * 1.8) - 90;
                    if(hMapped > 90) hMapped = 90; if(hMapped < -90) hMapped = -90;
                    
                    document.getElementById('tempNeedle').style.transform = `translateX(-50%) rotate(${tMapped}deg)`;
                    document.getElementById('humNeedle').style.transform = `translateX(-50%) rotate(${hMapped}deg)`;
                }

                const view = new google.visualization.DataView(data);
                view.setRows(data.getSortedRows([{column: 0, asc: true}]));
                
                const options = {
                    curveType: 'function',
                    legend: { position: 'bottom', textStyle: { color: '#8b949e' } },
                    colors: ['#ff9f43', '#00d2ff'],
                    backgroundColor: 'transparent',
                    hAxis: { textStyle: { color: '#8b949e' }, gridlines: { color: '#30363d' } },
                    vAxis: { textStyle: { color: '#8b949e' }, gridlines: { color: '#30363d' }, viewWindow: { min: 0 } },
                    chartArea: { width: '90%', height: '70%' },
                    interpolateNulls: true
                };

                const chart = new google.visualization.LineChart(document.getElementById('line_chart'));
                chart.draw(view, options);
            });
        }

        function updateClock() {
            const now = new Date();
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            document.getElementById('clockDisplay').innerText = days[now.getDay()] + ' ' + now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();
        setInterval(() => drawChart(1), 60000);
    </script>
</body>
</html>
