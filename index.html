<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraTech Dashboard</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f4f7; text-align: center; }
        header { background: linear-gradient(135deg, #1a2a6c, #b21f1f); color: white; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; flex: 1; min-width: 250px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .value { font-size: 2.5rem; font-weight: bold; color: #2c3e50; }
        .chart-card { background: white; padding: 20px; border-radius: 15px; width: 90%; max-width: 1000px; margin: 20px auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #line_chart { width: 100%; height: 400px; min-height: 400px; }
        .btn-group button { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; background: #1a2a6c; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <header><h1>TERRATECH INNOVATION</h1></header>
    <div class="container">
        <div class="card"><h3>Temperature</h3><div id="t_val" class="value">--°C</div></div>
        <div class="card"><h3>Humidity</h3><div id="h_val" class="value">--%</div></div>
    </div>
    <div class="chart-card">
        <div class="btn-group">
            <button onclick="drawChart(1)">1 Day</button>
            <button onclick="drawChart(7)">7 Days</button>
            <button onclick="drawChart(30)">1 Month</button>
        </div>
        <div id="line_chart">กำลังโหลดกราฟ...</div>
    </div>

    <script>
        google.charts.load('current', {'packages':['corechart']});
        google.charts.setOnLoadCallback(() => drawChart(1));

        function drawChart(days) {
            const sheetID = '1xHbWToMwGLVQCYtH2A5FH4MaYDB9lt3QkIbcEz8coQI';
            // ดึงข้อมูล 100 แถวแรกเพื่อความเร็วในการแสดงผล Real-time
            const query = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tq=select A,B,C order by A desc limit ${days * 200}`);
            
            query.send(response => {
                if (response.isError()) {
                    document.getElementById('line_chart').innerHTML = "Error: " + response.getMessage();
                    return;
                }
                const data = response.getDataTable();
                
                // อัปเดตตัวเลขล่าสุด (แถวที่ 0 คือล่าสุดเพราะเรา order by A desc)
                if (data.getNumberOfRows() > 0) {
                    let t = data.getValue(0, 1);
                    let h = data.getValue(0, 2);
                    document.getElementById('t_val').innerText = (typeof t === 'number' ? t.toFixed(1) : t) + "°C";
                    document.getElementById('h_val').innerText = (typeof h === 'number' ? h.toFixed(1) : h) + "%";
                }

                // สร้าง View ใหม่และเรียงลำดับจากเก่าไปใหม่ (เพื่อให้กราฟวิ่งจากซ้ายไปขวา)
                const view = new google.visualization.DataView(data);
                view.setRows(data.getSortedRows([{column: 0, asc: true}]));
                
                const options = {
                    curveType: 'function',
                    legend: { position: 'bottom' },
                    colors: ['#e74c3c', '#3498db'],
                    hAxis: { title: 'Timeline', gridlines: { count: 10 } },
                    vAxis: { title: 'Value', gridlines: { color: '#eee' }, viewWindow: { min: 0 } },
                    chartArea: { width: '85%', height: '70%' },
                    interpolateNulls: true
                };

                const chart = new google.visualization.LineChart(document.getElementById('line_chart'));
                chart.draw(view, options);
            });
        }
        // รีเฟรชอัตโนมัติทุก 1 นาที
        setInterval(() => drawChart(1), 60000);
    </script>
</body>
</html>
