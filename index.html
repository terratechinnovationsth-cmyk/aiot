<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraTech Dashboard | Dark Mode Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        :root {
            --bg-dark: #0b0e11;
            --card-bg: #161b22;
            --text-main: #e4e6eb;
            --border-color: #30363d;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding-bottom: 50px;
        }

        header {
            padding: 30px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .dashboard-title { font-weight: bold; color: #ffffff; }

        .tech-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            padding: 20px;
            height: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .label-text {
            color: #8b949e;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        /* --- ส่วนของ Half-Gauge Custom CSS --- */
        .gauge-wrapper {
            position: relative;
            width: 200px;
            height: 100px; /* ครึ่งวงกลม */
            margin: 0 auto;
            overflow: hidden;
        }

        .gauge-bg {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 20px solid transparent;
        }

        /* ไล่เฉดสีอุณหภูมิ (เขียว -> เหลือง -> แดง) */
        .temp-gradient {
            background: conic-gradient(from -90deg, #2ecc71 0deg, #f1c40f 90deg, #e74c3c 180deg);
            mask: radial-gradient(farthest-side, transparent 79%, white 80%);
            -webkit-mask: radial-gradient(farthest-side, transparent 79%, white 80%);
        }

        /* ไล่เฉดสีความชื้น (ฟ้าอ่อน -> น้ำเงินเข้ม) */
        .hum-gradient {
            background: conic-gradient(from -90deg, #a5f3fc 0deg, #00d2ff 90deg, #004e92 180deg);
            mask: radial-gradient(farthest-side, transparent 79%, white 80%);
            -webkit-mask: radial-gradient(farthest-side, transparent 79%, white 80%);
        }

        .needle {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 4px;
            height: 85px;
            background: #ffffff;
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(-90deg); /* เริ่มที่ 0 */
            transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            border-radius: 4px;
        }

        .needle::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            background: #ffffff;
            border-radius: 50%;
        }

        .value-display {
            font-size: 2.2rem;
            font-weight: bold;
            color: #ffffff;
            margin-top: 10px;
        }

        .unit { font-size: 1rem; color: #8b949e; }

        #line_chart { width: 100%; height: 400px; background: transparent; }

        .btn-group-tech .btn {
            border-color: var(--border-color);
            color: #8b949e;
        }

        .btn-group-tech .btn:hover, .btn-group-tech .btn.active-btn {
            background-color: #1f6feb;
            color: white;
        }
    </style>
</head>
<body>

    <header class="text-center">
        <div class="container d-md-flex justify-content-between align-items-center text-md-start">
            <div>
                <h1 class="h3 dashboard-title mb-1">TERRATECH INNOVATION</h1>
                <p class="text-secondary mb-0">Professional Environment Gauge</p>
            </div>
            <div class="text-md-end mt-3 mt-md-0">
                <h2 id="clockDisplay" class="h4 mb-0 text-light" style="font-weight: 300;">-</h2>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="row g-4 mb-4">
            <div class="col-md-6">
                <div class="tech-card text-center">
                    <div class="label-text"><span>Temperature</span><span>°C</span></div>
                    <div class="gauge-wrapper">
                        <div class="gauge-bg temp-gradient"></div>
                        <div id="tempNeedle" class="needle"></div>
                    </div>
                    <div class="value-display" id="t_val">--</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="tech-card text-center">
                    <div class="label-text"><span>Humidity</span><span>%</span></div>
                    <div class="gauge-wrapper">
                        <div class="gauge-bg hum-gradient"></div>
                        <div id="humNeedle" class="needle"></div>
                    </div>
                    <div class="value-display" id="h_val">--</div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="tech-card">
                    <div class="d-md-flex justify-content-between align-items-center mb-4">
                        <h3 class="h6 fw-bold text-uppercase m-0" style="color: #8b949e;">Historical Trend</h3>
                        <div class="btn-group btn-group-tech mt-3 mt-md-0" role="group">
                            <button type="button" class="btn btn-sm" onclick="drawChart(1)">1 Day</button>
                            <button type="button" class="btn btn-sm" onclick="drawChart(7)">7 Days</button>
                            <button type="button" class="btn btn-sm" onclick="drawChart(30)">1 Month</button>
                        </div>
                    </div>
                    <div id="line_chart">กำลังดึงข้อมูล...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        google.charts.load('current', {'packages':['corechart']});
        google.charts.setOnLoadCallback(() => drawChart(1));

        function drawChart(days) {
            const sheetID = '1xHbWToMwGLVQCYtH2A5FH4MaYDB9lt3QkIbcEz8coQI';
            const query = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tq=select A,B,C order by A desc limit ${days * 200}`);
            
            query.send(response => {
                if (response.isError()) {
                    document.getElementById('line_chart').innerHTML = "Error: " + response.getMessage();
                    return;
                }
                const data = response.getDataTable();
                
                if (data.getNumberOfRows() > 0) {
                    let t = data.getValue(0, 1);
                    let h = data.getValue(0, 2);
                    
                    // อัปเดตตัวเลข
                    document.getElementById('t_val').innerHTML = (typeof t === 'number' ? t.toFixed(1) : t) + '<span class="unit">°C</span>';
                    document.getElementById('h_val').innerHTML = (typeof h === 'number' ? h.toFixed(1) : h) + '<span class="unit">%</span>';
                    
                    // --- คำนวณองศาเข็ม (0-100% แมพเป็น -90 ถึง 90 องศา) ---
                    const tDeg = (t * 1.8) - 90;
                    const hDeg = (h * 1.8) - 90;
                    
                    document.getElementById('tempNeedle').style.transform = `translateX(-50%) rotate(${tDeg}deg)`;
                    document.getElementById('humNeedle').style.transform = `translateX(-50%) rotate(${hDeg}deg)`;
                }

                const view = new google.visualization.DataView(data);
                view.setRows(data.getSortedRows([{column: 0, asc: true}]));
                
                const options = {
                    curveType: 'function',
                    legend: { position: 'bottom', textStyle: { color: '#8b949e' } },
                    colors: ['#ff9f43', '#00d2ff'],
                    backgroundColor: 'transparent',
                    hAxis: { textStyle: { color: '#8b949e' }, gridlines: { color: '#30363d' } },
                    vAxis: { textStyle: { color: '#8b949e' }, gridlines: { color: '#30363d' }, viewWindow: { min: 0 } },
                    chartArea: { width: '90%', height: '70%' },
                    interpolateNulls: true
                };

                const chart = new google.visualization.LineChart(document.getElementById('line_chart'));
                chart.draw(view, options);
            });
        }

        function updateClock() {
            const now = new Date();
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            document.getElementById('clockDisplay').innerText = days[now.getDay()] + ' ' + now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000);
        updateClock();
        setInterval(() => drawChart(1), 60000);
    </script>
</body>
</html>
